name: Setup project
description: Checkout, install Bun, install deps, and prepare ci-artifacts/.
runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
    - name: Prepare artifact dir
      shell: bash
      run: mkdir -p ci-artifacts
